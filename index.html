<!DOCTYPE html>
<html>
<head>
  <title>TexLab Academy</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 40px; }
    button { margin: 5px; padding: 10px; }
    .card { border:1px solid #ddd; padding:15px; margin:10px; }
  </style>
</head>
<body>

<h1>🚀 TexLab Academy</h1>

<button onclick="loadCourses()">Courses</button>
<button onclick="loadISO()">ISO 17025 Audit</button>

<div id="content"></div>

<script>
async function loadCourses() {
  const res = await fetch('/courses');
  const data = await res.json();

  document.getElementById('content').innerHTML =
    data.map(c => `
      <div class="card">
        <h3>${c.title}</h3>
        <button onclick="startExam(${c.id})">Start Exam</button>
      </div>
    `).join('');
}

async function startExam(id) {
  const res = await fetch('/exam/' + id);
  const q = await res.json();

  alert(q[0].q);

  const submit = await fetch('/exam/' + id + '/submit', { method:'POST' });
  const result = await submit.json();

  window.open('/certificate/' + result.certificateId);
}

async function loadISO() {
  const res = await fetch('/iso17025');
  const data = await res.json();

  document.getElementById('content').innerHTML =
    data.map(c => `
      <div class="card">
        ${c.clause} - ${c.title}
        <br/>
        Status: ${c.status ? "✅" : "❌"}
        <br/>
        <button onclick="mark('${c.clause}')">Mark Done</button>
      </div>
    `).join('');

  loadScore();
}

async function mark(clause) {
  await fetch('/iso17025/update', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({clause})
  });

  loadISO();
}

async function loadScore() {
  const res = await fetch('/iso17025/score');
  const data = await res.json();

  document.getElementById('content').innerHTML +=
    `<h2>Readiness Score: ${data.score}%</h2>`;
}
</script>

</body>
</html>
